name: Build Windows Executable & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Set up Python
      # ----------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------------------------------
      # 3. Install dependencies
      # ----------------------------------------------------------------
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install core dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # ----------------------------------------------------------------
      # 4. Download spaCy models
      # ----------------------------------------------------------------
      - name: Download English spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Download multilingual spaCy model (Hebrew NER)
        run: python -m spacy download xx_ent_wiki_sm

      # ----------------------------------------------------------------
      # 5. Verify models and hebrew_data
      # ----------------------------------------------------------------
      - name: Verify models and hebrew_data
        shell: python
        run: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          import spacy
          for model in ("en_core_web_sm", "xx_ent_wiki_sm"):
              try:
                  p = spacy.util.get_package_path(model)
                  print(f"OK  {model}: {p}")
              except Exception as e:
                  print(f"FAIL {model}: {e}")
          from hebrew_data import HEBREW_FIRST_NAMES, HEBREW_LAST_NAMES, HEBREW_LOCATIONS
          print(f"Hebrew dict: {len(HEBREW_FIRST_NAMES)} first names, {len(HEBREW_LAST_NAMES)} last names, {len(HEBREW_LOCATIONS)} locations")

      # ----------------------------------------------------------------
      # 6. Get spaCy model paths
      # ----------------------------------------------------------------
      - name: Get spaCy model paths
        shell: python
        run: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          import spacy
          en_path = str(spacy.util.get_package_path('en_core_web_sm'))
          xx_path = str(spacy.util.get_package_path('xx_ent_wiki_sm'))
          print(f"EN: {en_path}")
          print(f"XX: {xx_path}")
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"EN_MODEL_PATH={en_path}\n")
              f.write(f"XX_MODEL_PATH={xx_path}\n")

      # ----------------------------------------------------------------
      # 7. Extract APP_VERSION from source
      # ----------------------------------------------------------------
      - name: Extract APP_VERSION
        id: get_version
        shell: python
        run: |
          import re, os
          src = open("pii_processor_gui.py", encoding="utf-8").read()
          m = re.search(r'^APP_VERSION\s*=\s*["\']([^"\']+)["\']', src, re.M)
          version = m.group(1) if m else "0.0"
          print(f"APP_VERSION = {version}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")

      # ----------------------------------------------------------------
      # 8. Build single-file Windows executable with PyInstaller
      # ----------------------------------------------------------------
      - name: Build single-file Windows executable with PyInstaller
        shell: cmd
        run: |
          python -m PyInstaller ^
            --name PII_Processor ^
            --onefile ^
            --windowed ^
            --noconfirm ^
            --add-data "%EN_MODEL_PATH%;en_core_web_sm" ^
            --add-data "%XX_MODEL_PATH%;xx_ent_wiki_sm" ^
            --add-data "hebrew_data.py;." ^
            --hidden-import presidio_analyzer ^
            --hidden-import presidio_analyzer.predefined_recognizers ^
            --hidden-import presidio_analyzer.predefined_recognizers.email_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.phone_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.ip_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.iban_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.credit_card_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.url_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.spacy_recognizer ^
            --hidden-import presidio_analyzer.nlp_engine ^
            --hidden-import presidio_analyzer.nlp_engine.spacy_nlp_engine ^
            --hidden-import presidio_anonymizer ^
            --hidden-import presidio_anonymizer.operators ^
            --hidden-import spacy ^
            --hidden-import spacy.lang.en ^
            --hidden-import spacy.lang.he ^
            --hidden-import spacy.lang.xx ^
            --hidden-import en_core_web_sm ^
            --hidden-import xx_ent_wiki_sm ^
            --hidden-import thinc ^
            --hidden-import thinc.api ^
            --hidden-import thinc.backends ^
            --hidden-import thinc.backends.numpy_ops ^
            --hidden-import blis ^
            --hidden-import cymem ^
            --hidden-import preshed ^
            --hidden-import murmurhash ^
            --hidden-import srsly ^
            --hidden-import catalogue ^
            --hidden-import confection ^
            --hidden-import weasel ^
            --hidden-import phonenumbers ^
            --hidden-import docx ^
            --hidden-import pdfminer ^
            --hidden-import pdfminer.high_level ^
            --hidden-import pdfminer.layout ^
            --hidden-import pdfminer.pdfpage ^
            --hidden-import pdfminer.pdfinterp ^
            --hidden-import pdfminer.converter ^
            --hidden-import pdfminer.pdfdocument ^
            --hidden-import pdfminer.pdfparser ^
            --hidden-import numpy ^
            --hidden-import numpy.core ^
            --hidden-import numpy.core._methods ^
            --hidden-import numpy.lib.format ^
            --hidden-import urllib.request ^
            --hidden-import urllib.error ^
            --collect-all spacy ^
            --collect-all en_core_web_sm ^
            --collect-all xx_ent_wiki_sm ^
            --collect-all presidio_analyzer ^
            --collect-all presidio_anonymizer ^
            --collect-all thinc ^
            --collect-all blis ^
            --collect-all confection ^
            --collect-all phonenumbers ^
            pii_processor_gui.py

      # ----------------------------------------------------------------
      # 9. Verify build output
      # ----------------------------------------------------------------
      - name: Verify build output
        shell: powershell
        run: |
          $exe = "dist\PII_Processor.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "SUCCESS: PII_Processor.exe built ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Host "ERROR: PII_Processor.exe not found"
            exit 1
          }

      # ----------------------------------------------------------------
      # 10. Create version.json manifest
      # ----------------------------------------------------------------
      - name: Create version.json manifest
        shell: python
        run: |
          import json, os
          version = "${{ steps.get_version.outputs.version }}"
          repo    = "${{ github.repository }}"
          manifest = {
              "version": version,
              "download_url": (
                  f"https://github.com/{repo}/releases/latest/download/PII_Processor.exe"
              ),
              "release_notes": f"Bug fixes and improvements",
              "min_version":   "1.0",
          }
          with open("dist/version.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))

      # ----------------------------------------------------------------
      # 11. Upload artifact (for manual download if needed)
      # ----------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PII_Processor_Windows_v${{ steps.get_version.outputs.version }}
          path: |
            dist/PII_Processor.exe
            dist/version.json
          retention-days: 30

      # ----------------------------------------------------------------
      # 12. Create / update GitHub Release
      #     The softprops action creates the tag + release automatically
      # ----------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: "PII Processor v${{ steps.get_version.outputs.version }}"
          body: |
            ## PII Processor v${{ steps.get_version.outputs.version }}

            ### What's new in this release
            - Fixed updater SSL error ("Update check failed: None") on Windows
            - Hebrew ambiguity review dialog: checklist of potential names for user confirmation
            - Debug Log tab with rotating log file and live viewer
            - Batch folder processing
            - Custom PII project lists (saved per matter folder)
            - Full Hebrew + English PII detection (Israeli ID, phone, IBAN, dates)

            ### How to install
            1. Download `PII_Processor.exe` below
            2. Double-click to run — no installation required
            3. Keep the `.exe` in a **writable folder** so future updates can replace it automatically

            ### How updates work
            The app checks for updates silently on startup. When a new version is available, a green banner appears in the header. Click **Download & Restart** and the update installs automatically.
          files: |
            dist/PII_Processor.exe
            dist/version.json
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
