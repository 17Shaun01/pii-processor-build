name: Build Windows EXE (Hebrew + English v4.0 - onefile)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install core dependencies
        run: |
          pip install click
          pip install presidio-analyzer presidio-anonymizer
          pip install spacy
          pip install python-docx "pdfminer.six" pyinstaller

      - name: Download English spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Download multilingual spaCy model (Hebrew NER)
        run: python -m spacy download xx_ent_wiki_sm

      - name: Verify models and hebrew_data
        shell: python
        run: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          import spacy
          for model in ("en_core_web_sm", "xx_ent_wiki_sm"):
              try:
                  p = spacy.util.get_package_path(model)
                  print(f"OK  {model}: {p}")
              except Exception as e:
                  print(f"FAIL {model}: {e}")
          from hebrew_data import HEBREW_FIRST_NAMES, HEBREW_LAST_NAMES, HEBREW_LOCATIONS
          print(f"Hebrew dict: {len(HEBREW_FIRST_NAMES)} first names, {len(HEBREW_LAST_NAMES)} last names, {len(HEBREW_LOCATIONS)} locations")

      - name: Get spaCy model paths
        shell: python
        run: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          import spacy
          en_path = str(spacy.util.get_package_path('en_core_web_sm'))
          xx_path = str(spacy.util.get_package_path('xx_ent_wiki_sm'))
          print(f"EN: {en_path}")
          print(f"XX: {xx_path}")
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"EN_MODEL_PATH={en_path}\n")
              f.write(f"XX_MODEL_PATH={xx_path}\n")

      - name: Build single-file Windows executable with PyInstaller
        shell: cmd
        run: |
          python -m PyInstaller ^
            --name PII_Processor ^
            --onefile ^
            --windowed ^
            --noconfirm ^
            --add-data "%EN_MODEL_PATH%;en_core_web_sm" ^
            --add-data "%XX_MODEL_PATH%;xx_ent_wiki_sm" ^
            --add-data "hebrew_data.py;." ^
            --hidden-import presidio_analyzer ^
            --hidden-import presidio_analyzer.predefined_recognizers ^
            --hidden-import presidio_analyzer.predefined_recognizers.email_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.phone_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.ip_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.iban_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.credit_card_recognizer ^
            --hidden-import presidio_analyzer.predefined_recognizers.url_recognizer ^
            --hidden-import presidio_analyzer.nlp_engine ^
            --hidden-import presidio_analyzer.nlp_engine.spacy_nlp_engine ^
            --hidden-import presidio_anonymizer ^
            --hidden-import presidio_anonymizer.operators ^
            --hidden-import spacy ^
            --hidden-import spacy.lang.en ^
            --hidden-import spacy.lang.he ^
            --hidden-import spacy.lang.xx ^
            --hidden-import en_core_web_sm ^
            --hidden-import xx_ent_wiki_sm ^
            --hidden-import thinc ^
            --hidden-import thinc.api ^
            --hidden-import thinc.backends ^
            --hidden-import thinc.backends.numpy_ops ^
            --hidden-import blis ^
            --hidden-import cymem ^
            --hidden-import preshed ^
            --hidden-import murmurhash ^
            --hidden-import srsly ^
            --hidden-import catalogue ^
            --hidden-import confection ^
            --hidden-import weasel ^
            --hidden-import phonenumbers ^
            --hidden-import docx ^
            --hidden-import pdfminer ^
            --hidden-import pdfminer.high_level ^
            --hidden-import pdfminer.layout ^
            --hidden-import pdfminer.pdfpage ^
            --hidden-import pdfminer.pdfinterp ^
            --hidden-import pdfminer.converter ^
            --hidden-import pdfminer.pdfdocument ^
            --hidden-import pdfminer.pdfparser ^
            --hidden-import numpy ^
            --hidden-import numpy.core ^
            --hidden-import numpy.core._methods ^
            --hidden-import numpy.lib.format ^
            --collect-all spacy ^
            --collect-all en_core_web_sm ^
            --collect-all xx_ent_wiki_sm ^
            --collect-all presidio_analyzer ^
            --collect-all presidio_anonymizer ^
            --collect-all thinc ^
            --collect-all blis ^
            --collect-all confection ^
            --collect-all phonenumbers ^
            pii_processor_gui.py

      - name: Verify build output
        shell: powershell
        run: |
          $exe = "dist\PII_Processor.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "SUCCESS: PII_Processor.exe built ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Host "ERROR: PII_Processor.exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PII_Processor_Windows_v4_onefile
          path: dist/PII_Processor.exe
          retention-days: 7
